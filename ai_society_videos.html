<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIと私たちの社会 — 動画で学ぶ10のテーマ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#111420;--card:#161b28;--border:#1e2535;
    --accent:#4f8ef7;--text:#e8eaf0;--muted:#6b7594;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
  header{padding:60px 40px 40px;max-width:1200px;margin:0 auto;}
  .header-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent);margin-bottom:16px;}
  h1{font-size:clamp(28px,5vw,52px);font-weight:700;line-height:1.2;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;}
  .header-sub{color:var(--muted);font-size:15px;line-height:1.7;max-width:560px;}
  .nav-wrap{max-width:1200px;margin:0 auto;padding:0 40px;}
  
  .nav{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:8px;}
  .tab{padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s;}
  .tab:hover{border-color:var(--accent);color:var(--text);}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .sections{max-width:1200px;margin:0 auto;padding:40px 40px 0;}
  .section{display:none;}
  .section.active{display:block;animation:fadeUp .3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .section-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
  .section-num{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;padding:6px 12px;border-radius:4px;white-space:nowrap;margin-top:4px;flex-shrink:0;}
  .section-title{font-size:24px;font-weight:700;margin-bottom:6px;}
  .section-desc{color:var(--muted);font-size:14px;line-height:1.7;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
  .card-thumb{display:block;width:100%;aspect-ratio:16/9;background:var(--surface);position:relative;overflow:hidden;}
  .card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
  .card:hover .card-thumb img{transform:scale(1.04);}
  .play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .2s;}
  .card:hover .play-btn{opacity:1;}
  .play-btn svg{width:48px;height:48px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));}
  .lang-badge{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:1px;}
  .lang-ja{background:rgba(79,142,247,.85);color:#fff;}
  .lang-en{background:rgba(124,95,245,.85);color:#fff;}
  .card-body{padding:16px 18px 20px;}
  .card-source{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;}
  .card-title{font-size:14px;font-weight:700;line-height:1.45;margin-bottom:8px;color:var(--text);}
  .card-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px;}
  .card-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:'Space Mono',monospace;color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:5px 12px;border-radius:6px;transition:background .15s,color .15s;}
  .card-link:hover{background:var(--accent);color:#fff;}
  .all-group{margin-bottom:52px;}
  .all-group-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .all-group-num{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:4px 10px;border-radius:4px;}
  .all-group-title{font-size:18px;font-weight:700;}
  @media(max-width:640px){header,.nav-wrap,.sections{padding-left:20px;padding-right:20px;}.cards{grid-template-columns:1fr;}h1{font-size:26px;}}
</style>
</head>

function makeCard(v){
  return`<div class="card">
    <a class="card-thumb" href="${v.url}" target="_blank" rel="noopener">
      <img src="${v.thumb}" alt="${v.title}" loading="lazy">
      <div class="play-btn"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="32" fill="rgba(255,255,255,0.15)"/><polygon points="26,20 48,32 26,44" fill="white"/></svg></div>
      <span class="lang-badge lang-${v.lang}">${v.lang==='ja'?'日本語':'English'}</span>
    </a>
    <div class="card-body">
      <div class="card-source">${v.src}</div>
      <div class="card-title">${v.title}</div>
      <div class="card-desc">${v.desc}</div>
      <a class="card-link" href="${v.url}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        YouTubeで見る
      </a>
    </div>
  </div>`;
}

    <span class="all-group-title">${cat.emoji} ${cat.title}</span>
  </div><div class="cards">${cat.videos.map(makeCard).join('')}</div>`;
  allSec.appendChild(g);
});

DATA.forEach(cat=>{
  const sec=document.createElement('div');
  sec.className='section';
  sec.id=`sec-${cat.id}`;
  sec.innerHTML=`<div class="section-header">
    <div class="section-num" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">${String(cat.id).padStart(2,'0')}</div>
    <div><div class="section-title">${cat.emoji} ${cat.title}</div><div class="section-desc">${cat.desc}</div></div>
  </div><div class="cards">${cat.videos.map(makeCard).join('')}</div>`;
  document.querySelector('.sections').appendChild(sec);
});
</script>
</div>
<script>
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const target=id==='all'?document.getElementById('sec-all'):document.getElementById(`sec-${id}`);
  if(target)target.classList.add('active');
  const tabs=document.querySelectorAll('.tab');
  const idx=id==='all'?0:parseInt(id);
  if(tabs[idx])tabs[idx].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('sec-all').classList.add('active');
</script>
</body>
</html>
